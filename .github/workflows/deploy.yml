name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # clona/actualiza solo

      - name: Instalar dependencias
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Reiniciar con PM2
        run: pm2 restart snippets-test || pm2 start "npx serve dist -p 3052" --name "snippets-test" && pm2 save

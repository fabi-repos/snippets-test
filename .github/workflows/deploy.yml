name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Debug servicio
        run: |
          Write-Host "Usuario actual:"
          whoami

          Write-Host "`nGet-Service:"
          Get-Service snippets-test -ErrorAction Continue

          Write-Host "`nSC Query:"
          sc.exe query snippets-test

      # - name: Reiniciar app
      #   run: |
      #     Stop-Service -Name "snippets-test" -Force -ErrorAction SilentlyContinue
      #     Start-Service -Name "snippets-test"

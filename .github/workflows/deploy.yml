name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Instalar PM2
        run: npm install -D pm2

      - name: Reiniciar con PM2
        run: |
          $process = pm2 describe snippets-test 2>&1
          if ($LASTEXITCODE -ne 0) {
            pm2 start "npx serve dist -p 3052" --name "snippets-test"
          } else {
            pm2 restart snippets-test
          }
          pm2 save
